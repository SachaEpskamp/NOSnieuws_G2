<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOS Nieuws voor Even G2</title>
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'unsafe-inline' blob:; worker-src 'self' blob:;" />
</head>

<body>
    <!-- Boots the app and starts the UI listeners -->
    <script type="module" src="/src/Main.ts"></script>

    <main id="app">
        <header class="masthead">
            <span class="nos-logo">NOS</span>
            <div>
                <h1 class="app-title">Nieuws</h1>
                <p class="app-subtitle">op je Even G2</p>
            </div>
        </header>

        <section class="card">
            <p class="hint">
                Op de bril: <b>schuif</b> door de koppen, <b>tik</b> om een artikel te openen
                (tik opnieuw voor terug), <b>dubbeltik</b> om de app te sluiten.
            </p>
        </section>

        <button class="big-button" id="refresh-button">Ververs nieuws</button>
        <p id="fetch-status" class="status"></p>

        <section class="card">
            <h2 class="section-title">Feeds</h2>
            <div id="feed-list"></div>
        </section>

        <section class="card">
            <h2 class="section-title">Berichten</h2>
            <div id="article-list"></div>
        </section>

        <button class="small-button" id="toggle-console">Debug-log tonen/verbergen</button>
    </main>

    <style>
        :root {
            --nos-red: #e61e14;
            --background: #f2f2f2;
            --card: #ffffff;
            --text-dark: #232323;
            --text-muted: rgba(35, 35, 35, 0.55);
            --border: rgba(35, 35, 35, 0.12);
        }

        body {
            background: var(--background);
            color: var(--text-dark);
            font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            margin: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 28px 24px 60px 24px;
        }

        .masthead {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nos-logo {
            background: var(--nos-red);
            color: #fff;
            font-weight: 800;
            font-size: 44px;
            letter-spacing: 2px;
            padding: 10px 22px;
            border-radius: 10px;
        }

        .app-title {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            line-height: 1.05;
        }

        .app-subtitle {
            font-size: 26px;
            color: var(--text-muted);
            margin: 2px 0 0 0;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .hint { font-size: 28px; margin: 0; line-height: 1.4; }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        .feed-group {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 22px 0 6px 0;
        }
        .feed-group:first-child { margin-top: 4px; }

        .feed-row {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 32px;
            padding: 14px 4px;
            border-bottom: 1px solid var(--border);
        }
        .feed-row:last-child { border-bottom: none; }

        .feed-row input[type="checkbox"] {
            width: 34px;
            height: 34px;
            accent-color: var(--nos-red);
            flex-shrink: 0;
        }

        .big-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            width: 100%;
            height: 96px;
            font-size: 38px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: var(--nos-red);
            color: #fff;
            transition: all 0.1s ease;
        }
        .big-button:active { opacity: 0.75; transform: scale(0.98); }
        .big-button:disabled { opacity: 0.5; }

        .small-button {
            padding: 14px;
            width: 100%;
            font-size: 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: var(--card);
            color: var(--text-muted);
        }

        .status {
            font-size: 27px;
            margin: 0;
            padding: 0 6px;
            color: var(--text-muted);
            word-break: break-word;
        }
        .status.status-error { color: var(--nos-red); font-weight: 600; }

        .article-row {
            padding: 14px 4px;
            border-bottom: 1px solid var(--border);
        }
        .article-row:last-child { border-bottom: none; }

        .article-title {
            font-size: 30px;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .article-meta {
            font-size: 24px;
            color: var(--text-muted);
            margin: 6px 0 0 0;
        }

        .article-empty {
            font-size: 28px;
            color: var(--text-muted);
            margin: 0;
        }
    </style>
</body>

</html>
